listen {
    host "127.0.0.1"
    port 6432
}

storage "postgres_server" {
    type "remote"

    host "127.0.0.1"
    port 5432
}

ldap_endpoint "ldap" {
    ldapserver "ldap.example.local"
    ldapport 389
    ldapscheme "ldap"
    # ldapbasedn "dc=example,dc=local"
    ldapbasedn "ou=people,dc=example,dc=local"
    ldapbinddn "cn=admin,dc=example,dc=local"
    ldapbindpasswd "oD2quooDaimulaegei7w"
    ldapsearchattribute "uid"
}

database "postgres" {
    user "postgres" {
        authentication "md5"
        password "md5163311300b0732b814a34aabfdfffe62"
        storage "postgres_server"

        pool_routing "internal"
        pool "session"
        pool_size 0
        pool_timeout 0
        pool_ttl 1201
        pool_discard no
        pool_cancel yes
        pool_rollback yes
        pool_client_idle_timeout 20
        pool_idle_in_transaction_timeout 20

        client_fwd_error yes
        client_max 107
        application_name_add_host yes
        server_lifetime 1901
    }
}

database default {
    user "user2" {
        authentication "clear_text"
        ldap_endpoint_name "ldap"
        # Пароль нужен т.к. нужно пройти и аутентификацию в pg
        password "654321"
        ldap_pool_size 10
        ldap_pool_timeout 1

        storage "postgres_server"
        pool "transaction"
        pool_size 0
        pool_timeout 0
        pool_ttl 1201
        pool_discard no
        pool_cancel yes
        pool_rollback yes
        pool_client_idle_timeout 20
        pool_idle_in_transaction_timeout 20
        client_fwd_error yes
        application_name_add_host yes
        server_lifetime 1901
        client_max 107
        log_debug yes
        log_query yes
    }
}

database default {
    user default {
        authentication "md5"
        auth_query "SELECT usename, passwd FROM pg_shadow WHERE usename=$1"
        auth_query_user "postgres"
        auth_query_db "postgres"
        storage_password "md5163311300b0732b814a34aabfdfffe62"
        storage "postgres_server"
        pool "transaction"
        pool_size 0
        application_name_add_host yes
        pool_timeout 1000
        pool_discard no
        pool_ttl 20
        pool_cancel yes
        pool_rollback yes
        client_max 32000
        client_fwd_error yes
        pool_client_idle_timeout 28800
        # password_passthrough yes
    }
}

unix_socket_dir "/tmp"
unix_socket_mode "0644"

log_file "/tmp/odyssey.log"
log_format         "%t pid=%p ms=%e level=%l client_id=%i server_id=%s db=%d user=%u context=%c text=%M\n"
log_to_stdout      no
log_debug          yes
log_query          no
log_config         yes
log_session        yes
log_stats          yes
daemonize          no

locks_dir "/tmp/odyssey"
graceful_die_on_errors yes
enable_online_restart no
bindwith_reuseport yes
sequential_routing yes
coroutine_stack_size 16
stats_interval 60
