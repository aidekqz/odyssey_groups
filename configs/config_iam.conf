listen {
    host "127.0.0.1"
    port 6432
}

storage "postgres_server" {
    type "remote"

    host "127.0.0.1"
    port 5432
}

storage "local" {
	type "local"
}

database "console" {
	user "admin" {
		authentication "none"
		role "admin"
		pool "session"
		storage "local"
	}
}

database "postgres" {
    user "postgres" {
        authentication "md5"
        password "md5163311300b0732b814a34aabfdfffe62"
        storage "postgres_server"

        pool_routing "internal"
        pool "session"
        pool_size 0
        pool_timeout 0
        pool_ttl 1201
        pool_discard no
        pool_cancel yes
        pool_rollback yes
        pool_client_idle_timeout 20
        pool_idle_in_transaction_timeout 20

        client_fwd_error yes
        client_max 107
        application_name_add_host yes
        server_lifetime 1901
    }
}

database default {
	user "user1" {
		authentication "clear_text"
                password "123"
                storage_user "postgres"
                storage_password "md5163311300b0732b814a34aabfdfffe62"

		enable_mdb_iamproxy_auth yes
		mdb_iamproxy_socket_path "/tmp/test_mdb_iamproxy.sock"

		storage "postgres_server"
		pool "session"
	}
}

unix_socket_dir "/tmp"
unix_socket_mode "0644"

log_file "/tmp/odyssey.log"
log_format         "%t pid=%p ms=%e level=%l client_id=%i server_id=%s db=%d user=%u context=%c text=%M\n"
log_to_stdout      no
log_debug          yes
log_query          no
log_config         yes
log_session        yes
log_stats          yes
daemonize          no

locks_dir "/tmp/odyssey"
graceful_die_on_errors yes
enable_online_restart no
bindwith_reuseport yes
sequential_routing yes
group_checker_interval 7000 # in ms

stats_interval 60
